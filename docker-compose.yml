services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: taskmanager_app
    volumes:
      - .:/var/www/html
    environment:
      - APP_ENV=local
    networks:
      - taskmanager

  nginx:
    image: nginx:alpine
    container_name: taskmanager_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - taskmanager

networks:
  taskmanager:
    driver: bridge
