services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: taskmanager_app
    volumes:
      - .:/var/www/html
    environment:
      - APP_ENV=local
    networks:
      - taskmanager
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: taskmanager_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      app:
        condition: service_healthy
    networks:
      - taskmanager

networks:
  taskmanager:
    driver: bridge
